name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Tailwind CSS CLI
        run: |
          npm install -g @tailwindcss/cli tailwindcss
          echo "NODE_PATH=$(npm root -g)" >> $GITHUB_ENV

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: make build

      - name: Test
        run: go test ./...
